<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Analizador de texto</title>
  <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Delius&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <header>
      <h1>Analizador de Texto</h1>
    </header>

    <div class="layout">

      <div class="col-left">
        <p class="hint">Escribe tu texto aquí para analizarlo ↓</p>

        <div class="textarea-wrapper">
          <textarea name="user-input" placeholder=""></textarea>
          <li data-caracteres="total" class="char-total"><button></button></li>
        </div>

        <div class="buttons">
          <button class="btn-red btn-ia">Mejorar con IA antes de analizar</button>
          <button id="reset-button" class="btn-yellow">Limpiar texto</button>
          <button class="btn-red">Exportar resultado</button>

        </div>

        <div class="metrics">
          <ul>
            <li data-caracteres="palabras"><button>Palabras:</button></li>
            <li data-caracteres="sin-espacios"><button>Caracteres sin espacios:</button></li>
            <li data-caracteres="parrafos"><button>Párrafos:</button></li>
            <li data-caracteres="oraciones"><button>Oraciones:</button></li>
            <li data-caracteres="numeros"><button>Números:</button></li>
            <li data-caracteres="promedio"><button>Promedio Longitud:</button></li>
          </ul>
        </div>
      </div>


      <div class="col-right">
        <div class="panel-title">
          Métricas y complejidad de tu texto
        </div>

        <div class="top-boxes">
          <li data-caracteres="idioma"><button>Idioma detectado:</button></li>
          <li data-caracteres="tiempo"><button>Tiempo de lectura:</button></li>
        </div>

        <div class="big-box">
          <li data-caracteres="legibilidad"><button>Legibilidad:</button></li>
        </div>

        <div class="big-box">
          <li data-caracteres="flesch">
            <button id="flesch-grade">Grado Flesch: —</button>
          </li>

      <div class="metrics2">
        <ul>
          <li data-caracteres="repetidas"><button>Palabras repetidas:</button></li>
        </ul>
      </div>

    </div>
  </div>

  <footer></footer>

  <script type="module" src="./index.js"></script>
</body>

</html>
